name: Build and deploy to GUD

on:
  push:
    branches:
      - main

jobs:

  build-images: 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: librebooking
          - name: caselabbetse
          - name: inventory
    steps:
      - name: Log in
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.name }}
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Fire Portainer pull hook
        run: curl -X POST "${{ secrets.PORTAINER_PULL_WEBHOOK }}"
