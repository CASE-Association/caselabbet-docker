services:
  db:
    image: mariadb:latest
    restart: always
    volumes: 
     - db_data:/config
    environment:
      PUID: 1000
      PGID: 1000
      # MYSQL_ROOT_PASSWORD: example
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PWD}
      MARIADB_DATABASE: librebooking
      MARIADB_USER: lb_user
      MARIADB_PASSWORD: ${LB_DBUSER_PWD}
      TZ: Europe/Stockholm

  adminer:
    image: adminer
    restart: always
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
      - db
    # ports:
    #   - 8002:8080

  librebooking:
    image: caselabbet/librebooking:latest
    # build: ./librebooking
    restart: always
    depends_on:
      - db
    ports:
      - "8001:8080"
    networks:
      - traefik_proxy
      - default
    volumes:
      - lb_config:/config
    environment:
      - LB_DATABASE_NAME=librebooking
      - LB_DATABASE_USER=lb_user
      - LB_DATABASE_PASSWORD=${LB_DBUSER_PWD}
      - LB_DATABASE_HOSTSPEC=db
      - LB_INSTALL_PASSWORD=${LB_INSTALL_PWD}
      - LB_DEFAULT_TIMEZONE=Europe/Stockholm
    labels:
      traefik.enable: true
      traefik.http.routers.case.rule: Host(`testing.caselabbet.se`)
      traefik.http.routers.case.entrypoints: websecure
      traefik.http.routers.case.tls.certresolver: letsencrypt
      traefik.http.services.case.loadbalancer.server.port: 8001

  tailscale:
    image: tailscale/tailscale:latest
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./tailscale-state:/var/lib/tailscale
    cap_add:
      - net_admin
      - net_raw
    restart: always

volumes:
  db_data:
  lb_config:

networks:
  traefik_proxy:
    external: true
